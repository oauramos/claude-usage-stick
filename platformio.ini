[env:m5stick-cplus]
platform = espressif32@6.9.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-*
upload_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    m5stack/M5StickCPlus@^0.1.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DARDUINO_M5STICK_C_PLUS
    -DCORE_DEBUG_LEVEL=1

[env:m5stick-cplus2]
platform = espressif32@6.9.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    m5stack/M5Unified@0.1.15
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_M5STICK_C_PLUS2
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1

[env:esp32c3-oled]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    olikraus/U8g2@^2.36.5
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_ESP32C3_OLED
    -DCORE_DEBUG_LEVEL=1

[env:tdisplay-s3]
platform = espressif32@6.9.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_TDISPLAY_S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_PARALLEL_8_BIT
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DCORE_DEBUG_LEVEL=1
