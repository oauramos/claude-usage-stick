[env:m5stick-cplus]
platform = espressif32@6.9.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-*
upload_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    m5stack/M5StickCPlus@^0.1.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DARDUINO_M5STICK_C_PLUS
    -DCORE_DEBUG_LEVEL=1

[env:m5stick-cplus2]
platform = espressif32@6.9.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    m5stack/M5Unified@0.1.15
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_M5STICK_C_PLUS2
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1

[env:tdisplay-s3]
platform = espressif32@6.9.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_TDISPLAY_S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_PARALLEL_8_BIT
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DCORE_DEBUG_LEVEL=1

; LilyGo T-Display S3 AMOLED (1.91" RM67162, e.g. H712/H713/H705/H681/H717 variants)
; Display is auto-detected at runtime by the LilyGo_AMOLED library.
[env:tdisplay-s3-amoled]
platform = espressif32@6.12.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series.git
    bodmer/TFT_eSPI@^2.5.31
    bblanchon/ArduinoJson@^7.0.0
    lewisxhe/XPowersLib@^0.2.7
    lewisxhe/SensorLib@^0.2.4

build_flags =
    -DBOARD_TDISPLAY_S3_AMOLED
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DLILYGO_TDISPLAY_AMOLED_SERIES
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DCORE_DEBUG_LEVEL=1
